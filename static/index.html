<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StainAI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e1420;
      --surface:    #131b28;
      --panel:      #182030;
      --border:     #1e2d45;
      --accent:     #e03535;
      --accent2:    #ff7070;
      --user-bg1:   #c92a2a;
      --user-bg2:   #e84040;
      --ai-bg:      #f8f5f2;
      --ai-text:    #1c1c1c;
      --text:       #dde4f0;
      --muted:      #6b7a99;
      --send:       #e03535;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── animated gradient background ── */
    body {
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 0%,   #e0353514 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 85% 100%,  #3b5bdb0d 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%,   #e0353508 0%, transparent 50%);
    }

    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100dvh;
      max-width: 800px; margin: 0 auto;
      background: linear-gradient(180deg, #131b28 0%, #0f1822 100%);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── header ── */
    .header {
      display: flex; align-items: center; gap: 13px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #182030 0%, #1a2438 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative; z-index: 10;
      box-shadow: 0 2px 20px #00000033;
    }

    /* Logo */
    .logo {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 14px;
      background: linear-gradient(145deg, #c92a2a, #e84040, #ff7070);
      box-shadow: 0 4px 16px #e0353540, 0 0 0 1px #e0353520;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; }

    .header-info { flex: 1; }

    .header-name {
      font-family: 'Pacifico', cursive;
      font-size: 1.1rem; color: #fff;
      background: linear-gradient(135deg, #fff 30%, #ffaaaa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.69rem; color: var(--muted); margin-top: 2px;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 7px #4ade8099;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── contact pill ── */
    .contact-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: linear-gradient(135deg, #c92a2a, #e84040);
      border: none; border-radius: 22px;
      color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 2px 12px #e0353540;
      transition: transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .contact-btn:hover { transform: scale(1.05); box-shadow: 0 4px 18px #e0353560; }
    .contact-btn:active { transform: scale(0.97); }

    /* ── messages ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 18px 16px;
      display: flex; flex-direction: column; gap: 3px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── welcome screen ── */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; gap: 16px;
      padding: 40px 24px; text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .welcome-logo {
      width: 84px; height: 84px; border-radius: 26px;
      background: linear-gradient(145deg, #c92a2a, #e84040, #ff7070);
      box-shadow: 0 8px 32px #e0353550, 0 0 0 1px #e0353525;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
      animation: floatLogo 3s ease-in-out infinite;
    }
    .welcome-logo svg { width: 46px; height: 46px; }

    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .welcome h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem; color: #fff;
      background: linear-gradient(135deg, #fff 20%, #ffbbbb 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      color: var(--muted); font-size: 0.88rem;
      max-width: 300px; line-height: 1.7; font-weight: 500;
    }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 6px;
    }

    .suggestion {
      background: linear-gradient(135deg, #182030, #1e2d45);
      border: 1px solid var(--border);
      color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      padding: 8px 15px; border-radius: 22px;
      cursor: pointer; transition: all 0.2s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: linear-gradient(135deg, #1e2030, #2a1818);
      box-shadow: 0 2px 12px #e0353520;
    }

    /* ── iOS-style bubbles ── */
    .msg-row {
      display: flex; align-items: flex-end; gap: 7px;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.ai   { flex-direction: row; }
    .msg-row.ai + .msg-row.user,
    .msg-row.user + .msg-row.ai { margin-top: 10px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(9px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 700; margin-bottom: 2px;
    }
    .avatar.ai-avatar {
      background: linear-gradient(145deg, #c92a2a, #e84040);
      box-shadow: 0 2px 8px #e0353530;
    }
    .avatar.user-avatar { background: var(--border); color: var(--muted); }

    .bubble {
      max-width: 74%; padding: 10px 14px;
      font-size: 0.91rem; line-height: 1.55;
      word-break: break-word; white-space: pre-wrap; font-weight: 500;
    }

    /* User — warm red gradient, tail bottom-right */
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--user-bg1), var(--user-bg2));
      color: #fff;
      border-radius: 20px 20px 5px 20px;
      box-shadow: 0 2px 12px #e0353530;
    }

    /* AI — warm off-white, tail bottom-left */
    .msg-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--ai-text);
      border-radius: 20px 20px 20px 5px;
      box-shadow: 0 2px 10px #00000025;
    }

    .bubble .time {
      display: block; font-size: 0.61rem;
      margin-top: 5px; opacity: 0.45;
      text-align: right; font-weight: 400;
    }
    .msg-row.user .bubble .time { opacity: 0.6; color: #ffd0d0; }

    /* ── typing dots ── */
    .typing-bubble {
      background: var(--ai-bg);
      border-radius: 20px 20px 20px 5px;
      padding: 13px 17px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 2px 10px #00000025;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #bbb; animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── rate limit bubble ── */
    .rate-bubble {
      background: linear-gradient(135deg, #2a1515, #221a1a);
      border: 1px solid #e0353540;
      border-radius: 20px 20px 20px 5px;
      padding: 11px 15px;
      font-size: 0.87rem; font-weight: 600; color: #ff9999;
      box-shadow: 0 2px 12px #e0353520;
      display: flex; align-items: center; gap: 8px;
    }
    .rate-bubble .countdown { font-weight: 700; color: #ff6b6b; min-width: 26px; text-align: center; }
    .input-row.locked { border-color: #e0353540 !important; opacity: 0.5; }
    textarea:disabled { cursor: not-allowed; }

    /* ── input area ── */
    .input-area {
      padding: 11px 16px 16px;
      background: linear-gradient(180deg, #182030 0%, #131b28 100%);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
      background: #0e1420;
      border: 1.5px solid var(--border);
      border-radius: 28px;
      padding: 8px 8px 8px 17px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within {
      border-color: #e0353560;
      box-shadow: 0 0 0 3px #e0353515;
    }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.92rem; font-weight: 500;
      resize: none; max-height: 120px;
      line-height: 1.5; padding: 5px 0;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #c92a2a, #e84040);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 3px 12px #e0353545;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 18px #e0353560; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    .footer-note {
      text-align: center; font-size: 0.63rem;
      color: var(--muted); margin-top: 8px; font-weight: 500;
    }
    .footer-note a { color: var(--accent2); text-decoration: none; }
    .footer-note a:hover { color: #fff; }
  </style>
</head>
<body>
<div class="app">


  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">StainAI Agent</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Online · Powered by Groq</span>
      </div>
    </div>
    <a class="contact-btn" href="https://linktr.ee/iamevanss" target="_blank" rel="noopener noreferrer">
      🔗 Contact
    </a>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>StainAI Agent</h2>
      <p>Your intelligent AI assistant. Ask me anything — I keep track of our conversation as we go.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
        <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
        <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
        <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row" id="inputRow">
      <textarea id="input" placeholder="Message StainAI..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="footer-note">
      StainAI · Built by <a href="https://linktr.ee/iamevanss" target="_blank">Stain</a>
    </div>
  </div>

</div>
<script>
  let history = [], isTyping = false, rateLimitTimer = null;
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const inputRow   = document.getElementById("inputRow");

  const getWelcome = () => document.getElementById("welcome");
  const getTime    = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  const S_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^\S+\s*/, "").trim();
    sendMessage();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function lockInput() {
    inputEl.disabled = true; sendBtn.disabled = true;
    inputRow.classList.add("locked");
  }

  function unlockInput() {
    inputEl.disabled = false; sendBtn.disabled = false;
    inputRow.classList.remove("locked"); inputEl.focus();
  }

  function showRateLimit(onDone) {
    const w = getWelcome(); if (w) w.remove();
    const row = document.createElement("div");
    row.className = "msg-row ai"; row.id = "rate-row";
    const av = document.createElement("div");
    av.className = "avatar ai-avatar"; av.innerHTML = S_ICON;
    const bub = document.createElement("div");
    bub.className = "rate-bubble";
    bub.innerHTML = `⏳ Rate limit reached. Retrying in <span class="countdown" id="cd">60</span>s`;
    row.appendChild(av); row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    lockInput();
    let secs = 60;
    rateLimitTimer = setInterval(() => {
      secs--;
      const cd = document.getElementById("cd");
      if (cd) cd.textContent = secs;
      if (secs <= 0) {
        clearInterval(rateLimitTimer); rateLimitTimer = null;
        const r = document.getElementById("rate-row"); if (r) r.remove();
        unlockInput(); if (onDone) onDone();
      }
    }, 1000);
  }

  function appendBubble(role, text) {
    const w = getWelcome(); if (w) w.remove();
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    const av = document.createElement("div");
    av.className = `avatar ${role === "ai" ? "ai-avatar" : "user-avatar"}`;
    av.innerHTML = role === "ai" ? S_ICON : "You";
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = `${escapeHtml(text)}<span class="time">${getTime()}</span>`;
    row.appendChild(av); row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const w = getWelcome(); if (w) w.remove();
    const row = document.createElement("div");
    row.className = "msg-row ai"; row.id = "typing-row";
    const av = document.createElement("div");
    av.className = "avatar ai-avatar"; av.innerHTML = S_ICON;
    const bub = document.createElement("div");
    bub.className = "typing-bubble";
    bub.innerHTML = "<span></span><span></span><span></span>";
    row.appendChild(av); row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-row"); if (t) t.remove();
  }

  async function sendMessage(retryText) {
    const text = retryText || inputEl.value.trim();
    if (!text || isTyping || rateLimitTimer) return;
    isTyping = true; sendBtn.disabled = true;
    if (!retryText) {
      inputEl.value = ""; inputEl.style.height = "auto";
      appendBubble("user", text);
      history.push({ role: "user", content: text });
    }
    showTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      removeTyping();
      if (res.status === 429) {
        isTyping = false;
        showRateLimit(() => sendMessage(text));
        return;
      }
      if (data.error) {
        appendBubble("ai", "⚠️ " + data.error);
      } else {
        appendBubble("ai", data.reply);
        history.push({ role: "assistant", content: data.reply });
        if (history.length > 40) history = history.slice(-40);
      }
    } catch {
      removeTyping();
      appendBubble("ai", "⚠️ Could not reach the server. Please try again.");
    }
    isTyping = false;
    if (!rateLimitTimer) { sendBtn.disabled = false; inputEl.focus(); }
  }

  function clearChat() {
    if (rateLimitTimer) { clearInterval(rateLimitTimer); rateLimitTimer = null; }
    unlockInput(); history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <h2>StainAI Agent</h2>
        <p>Your intelligent AI assistant. Ask me anything — I keep track of our conversation as we go.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
          <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
          <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
        </div>
      </div>`;
  }

  inputEl.focus();
</script>
</body>
</html>
