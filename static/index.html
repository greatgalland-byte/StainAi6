<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StainAI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a1a;
      --surface:   #212121;
      --panel:     #2a2a2a;
      --border:    #333333;
      --accent:    #e03535;
      --accent2:   #ff6b6b;
      --user-bg:   #e03535;
      --ai-bg:     #f5f5f0;
      --ai-text:   #1a1a1a;
      --text:      #f0f0f0;
      --muted:     #888888;
      --send:      #e03535;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      width: 42px; height: 42px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, #e03535, #ff6b6b);
      box-shadow: 0 2px 12px #e0353555;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; }

    .header-info { flex: 1; }

    .header-name {
      font-family: 'Pacifico', cursive;
      font-size: 1.1rem;
      color: #fff;
      text-shadow: 0 1px 6px #e0353544;
    }

    .header-status {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade8099;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ── hamburger ── */
    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 7px 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: #ffffff11; }
    .menu-btn span {
      display: block;
      width: 22px; height: 2px;
      background: var(--text);
      border-radius: 2px;
    }

    /* ── dropdown ── */
    .dropdown {
      position: absolute;
      top: 66px;
      right: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-width: 190px;
      box-shadow: 0 8px 32px #00000066;
      z-index: 100;
      transform-origin: top right;
      transform: scale(0.88);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dropdown.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
    }
    .dropdown-item:hover { background: #ffffff0d; }
    .dropdown-divider { height: 1px; background: var(--border); }

    /* ── overlay ── */
    .overlay {
      position: fixed; inset: 0;
      z-index: 50; display: none;
    }
    .overlay.active { display: block; }

    /* ── messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── welcome ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      padding: 40px 20px;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .welcome-logo {
      width: 82px; height: 82px;
      border-radius: 50%;
      background: linear-gradient(145deg, #e03535, #ff6b6b);
      box-shadow: 0 4px 28px #e0353566;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }
    .welcome-logo svg { width: 46px; height: 46px; }

    .welcome h2 {
      font-family: 'Pacifico', cursive;
      font-size: 1.85rem;
      color: #fff;
      text-shadow: 0 2px 10px #e0353533;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.87rem;
      max-width: 300px;
      line-height: 1.65;
      font-weight: 500;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .suggestion {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent2); background: #e0353511; }

    /* ── iOS bubble rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.ai   { flex-direction: row; }
    .msg-row.ai + .msg-row.user,
    .msg-row.user + .msg-row.ai { margin-top: 10px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .avatar.ai-avatar { background: linear-gradient(145deg, #e03535, #ff6b6b); }
    .avatar.user-avatar { background: var(--border); color: var(--muted); }

    /* iOS-style tails */
    .bubble {
      max-width: 75%;
      padding: 9px 13px;
      font-size: 0.91rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      font-weight: 500;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-radius: 20px 20px 5px 20px;
      box-shadow: 0 1px 5px #e0353533;
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--ai-text);
      border-radius: 20px 20px 20px 5px;
      box-shadow: 0 1px 4px #00000022;
    }

    .bubble .time {
      display: block;
      font-size: 0.61rem;
      margin-top: 4px;
      opacity: 0.45;
      text-align: right;
      font-weight: 400;
    }

    /* ── typing ── */
    .typing-bubble {
      background: var(--ai-bg);
      border-radius: 20px 20px 20px 5px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: 0 1px 4px #00000022;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── input ── */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 26px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--send);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 2px 8px #e0353544;
    }
    .send-btn:hover { transform: scale(1.08); background: var(--accent2); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    .footer-note {
      text-align: center;
      font-size: 0.63rem;
      color: var(--muted);
      margin-top: 7px;
      font-weight: 500;
    }
    .footer-note a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>
<div class="app">

  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">StainAI Agent</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Online · Powered by OpenRouter</span>
      </div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="dropdown" id="dropdown">
      <button class="dropdown-item" onclick="clearChat(); closeMenu()">
        <span>🧹</span> Clear Chat
      </button>
      <div class="dropdown-divider"></div>
      <a class="dropdown-item" href="https://linktr.ee/iamevanss" target="_blank" onclick="closeMenu()">
        <span>🔗</span> Contact Stain
      </a>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>StainAI Agent</h2>
      <p>Your intelligent AI assistant. Ask me anything — I keep track of our conversation.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
        <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
        <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
        <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Message StainAI..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="footer-note">
      StainAI · Built by <a href="https://linktr.ee/iamevanss" target="_blank">Stain</a>
    </div>
  </div>

</div>
<script>
  let history = [], isTyping = false;
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  const getWelcome = () => document.getElementById("welcome");
  const getTime = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^\S+\s*/, "").trim();
    sendMessage();
  }

  function toggleMenu() {
    document.getElementById("dropdown").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("active");
  }

  function closeMenu() {
    document.getElementById("dropdown").classList.remove("open");
    document.getElementById("overlay").classList.remove("active");
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  const S_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;

  function appendBubble(role, text) {
    const w = getWelcome(); if (w) w.remove();
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    const av = document.createElement("div");
    av.className = `avatar ${role === "ai" ? "ai-avatar" : "user-avatar"}`;
    av.innerHTML = role === "ai" ? S_ICON : "You";
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = `${escapeHtml(text)}<span class="time">${getTime()}</span>`;
    row.appendChild(av); row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const w = getWelcome(); if (w) w.remove();
    const row = document.createElement("div");
    row.className = "msg-row ai"; row.id = "typing-row";
    const av = document.createElement("div");
    av.className = "avatar ai-avatar"; av.innerHTML = S_ICON;
    const bub = document.createElement("div");
    bub.className = "typing-bubble";
    bub.innerHTML = "<span></span><span></span><span></span>";
    row.appendChild(av); row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-row"); if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;
    isTyping = true; sendBtn.disabled = true;
    inputEl.value = ""; inputEl.style.height = "auto";
    appendBubble("user", text);
    history.push({ role: "user", content: text });
    showTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendBubble("ai", "⚠️ " + data.error);
      } else {
        appendBubble("ai", data.reply);
        history.push({ role: "assistant", content: data.reply });
        if (history.length > 40) history = history.slice(-40);
      }
    } catch {
      removeTyping();
      appendBubble("ai", "⚠️ Could not reach the server. Please try again.");
    }
    isTyping = false; sendBtn.disabled = false; inputEl.focus();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 9C7 7.3 8.5 6 10.5 6H14C15.7 6 17 7.3 17 9C17 10.7 15.7 12 14 12H10C8.3 12 7 13.3 7 15C7 16.7 8.3 18 10 18H13.5C15.2 18 17 16.8 17 15" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <h2>StainAI Agent</h2>
        <p>Your intelligent AI assistant. Ask me anything — I keep track of our conversation.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
          <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
          <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
        </div>
      </div>`;
  }

  inputEl.focus();
</script>
</body>
  </html>
