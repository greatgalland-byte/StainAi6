<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StainAI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --panel:     #1c2030;
      --border:    #252a3a;
      --accent:    #6c8eff;
      --accent2:   #a78bfa;
      --user-bg:   #6c8eff;
      --ai-bg:     #1e2333;
      --text:      #e8eaf6;
      --muted:     #7b82a0;
      --send:      #6c8eff;
      --radius:    18px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 780px;
      margin: 0 auto;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }

    .header-status {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade8088;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
      font-family: 'DM Sans', sans-serif;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── welcome ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px 20px;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .welcome-logo { width: 72px; height: 72px; margin-bottom: 4px; }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.88rem;
      max-width: 300px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); background: #6c8eff11; }

    /* ── bubble row ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
      max-width: 100%;
    }

    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.ai   { flex-direction: row; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .avatar.ai-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .avatar.user-avatar {
      background: var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-radius: var(--radius) var(--radius) 4px var(--radius);
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--text);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      border: 1px solid var(--border);
    }

    .bubble .time {
      display: block;
      font-size: 0.65rem;
      margin-top: 5px;
      opacity: 0.55;
      text-align: right;
    }

    /* ── typing indicator ── */
    .typing-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── input area ── */
    .input-area {
      padding: 12px 16px 16px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--send);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s;
    }

    .send-btn:hover { transform: scale(1.08); background: var(--accent2); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .footer-note a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <svg class="logo" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="42" y2="42" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6c8eff"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <rect width="42" height="42" rx="12" fill="url(#lg1)"/>
      <!-- S letterform -->
      <path d="M14 16.5C14 14.5 15.8 13 18.5 13H24C26.2 13 28 14.8 28 17C28 19.2 26.2 21 24 21H18C15.8 21 14 22.8 14 25C14 27.2 15.8 29 18 29H24.5C26.5 29 28 27.5 28 25.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="header-info">
      <div class="header-name">StainAI Agent</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Online · Powered by OpenRouter</span>
      </div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <svg class="welcome-logo" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg2" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6c8eff"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
        <rect width="72" height="72" rx="20" fill="url(#lg2)"/>
        <path d="M22 28C22 25 24.7 22 29 22H41C44.5 22 47 24.5 47 28C47 31.5 44.5 34 41 34H31C27.5 34 25 36.5 25 40C25 43.5 27.5 46 31 46H43C46 46 48 44 48 41" stroke="white" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <h2>StainAI Agent</h2>
      <p>Your intelligent AI assistant. Ask me anything — I remember our conversation as we go.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
        <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
        <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
        <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Message StainAI..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="footer-note">
      StainAI · Built by <a href="https://linktr.ee/iamevanss" target="_blank">Stain</a>
    </div>
  </div>

</div>

<script>
  let history = [];
  let isTyping = false;

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const welcomeEl  = document.getElementById("welcome");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^[^\w]+/, "").trim();
    sendMessage();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendBubble(role, text) {
    if (welcomeEl) welcomeEl.remove();

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role === "ai" ? "ai-avatar" : "user-avatar"}`;
    avatar.innerHTML = role === "ai"
      ? `<svg width="16" height="16" viewBox="0 0 42 42" fill="none"><path d="M14 16.5C14 14.5 15.8 13 18.5 13H24C26.2 13 28 14.8 28 17C28 19.2 26.2 21 24 21H18C15.8 21 14 22.8 14 25C14 27.2 15.8 29 18 29H24.5C26.5 29 28 27.5 28 25.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>`
      : "You";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `${escapeHtml(text)}<span class="time">${getTime()}</span>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    if (welcomeEl) welcomeEl.remove();
    const row = document.createElement("div");
    row.className = "msg-row ai";
    row.id = "typing-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai-avatar";
    avatar.innerHTML = `<svg width="16" height="16" viewBox="0 0 42 42" fill="none"><path d="M14 16.5C14 14.5 15.8 13 18.5 13H24C26.2 13 28 14.8 28 17C28 19.2 26.2 21 24 21H18C15.8 21 14 22.8 14 25C14 27.2 15.8 29 18 29H24.5C26.5 29 28 27.5 28 25.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>`;

    const bubble = document.createElement("div");
    bubble.className = "typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    isTyping = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    appendBubble("user", text);
    history.push({ role: "user", content: text });
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendBubble("ai", "⚠️ " + data.error);
      } else {
        appendBubble("ai", data.reply);
        history.push({ role: "assistant", content: data.reply });

        // Cap history at 20 exchanges
        if (history.length > 40) {
          history = history.slice(-40);
        }
      }
    } catch (err) {
      removeTyping();
      appendBubble("ai", "⚠️ Could not reach the server. Please try again.");
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <svg class="welcome-logo" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg2b" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6c8eff"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <rect width="72" height="72" rx="20" fill="url(#lg2b)"/>
          <path d="M22 28C22 25 24.7 22 29 22H41C44.5 22 47 24.5 47 28C47 31.5 44.5 34 41 34H31C27.5 34 25 36.5 25 40C25 43.5 27.5 46 31 46H43C46 46 48 44 48 41" stroke="white" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h2>StainAI Agent</h2>
        <p>Your intelligent AI assistant. Ask me anything — I remember our conversation as we go.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">✍️ Write me a poem</button>
          <button class="suggestion" onclick="sendSuggestion(this)">💡 Explain quantum physics simply</button>
          <button class="suggestion" onclick="sendSuggestion(this)">🛠 Debug my code</button>
          <button class="suggestion" onclick="sendSuggestion(this)">📝 Help me write an email</button>
        </div>
      </div>`;
  }

  inputEl.focus();
</script>
</body>
</html>
